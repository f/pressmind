name: Release

on:
    push:
        tags:
            - 'v*.*.*'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    release:
        name: Build and publish release
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm install

            - name: Build block assets
              run: npm run build

            - name: Prepare plugin package
              run: |
                  rm -rf dist
                  mkdir -p dist/pressmind
                  rsync -av \
                    --exclude='.git' \
                    --exclude='.github' \
                    --exclude='dist' \
                    --exclude='node_modules' \
                    --exclude='src' \
                    --exclude='scripts' \
                    --exclude='package-lock.json' \
                    --exclude='package.json' \
                    ./ dist/pressmind/
                  cd dist
                  zip -r pressmind.zip pressmind

            - name: Create GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/pressmind.zip
                  generate_release_notes: true
                  fail_on_unmatched_files: true
